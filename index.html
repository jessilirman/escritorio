<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Etiquetas - Escritório</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Estilos de Impressão */
        @media print {
            @page {
                size: A4;
                /* Margem superior de 1.5cm conforme solicitado, laterais e fundo de 1cm */
                margin: 1.5cm 10mm 10mm 10mm;
            }
            html, body {
                background: white !important;
                background-color: white !important;
                margin: 0;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .labels-container {
                display: grid !important;
                grid-template-columns: repeat(3, 5cm) !important;
                gap: 2px; /* Espaço mínimo para guiar o corte sem desperdício */
                justify-content: center;
                background: transparent !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            /* Remove sombras e fundos de interface na impressão */
            .label-outer-wrapper {
                box-shadow: none !important;
                background: transparent !important;
            }
        }

        /* Estilos de Tela */
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .label-outer {
            width: 5cm;
            height: 3cm;
            border: 1px solid black;
            padding: 2px;
            box-sizing: border-box;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .label-inner {
            width: 100%;
            height: 1.35cm;
            border: 1px solid black;
            box-sizing: border-box;
            padding: 2px 4px;
            overflow: hidden;
            word-wrap: break-word;
        }

        .label-text {
            font-family: 'EB Garamond', serif;
            font-weight: 700; /* Negrito */
            font-size: 11pt;
            line-height: 1.1;
            text-transform: uppercase;
            color: black;
            outline: none;
        }

        .labels-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, 5cm);
            gap: 15px;
            justify-content: center;
            padding: 20px;
        }

        .controls-card {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="no-print">
        <div class="controls-card">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Gerador de Etiquetas para Pastas</h1>
            <p class="text-gray-600 mb-6">Insira os nomes abaixo. As etiquetas têm 5cm x 3cm (quadro interno de 1,35cm). Adicionada margem de segurança superior de 1,5cm para impressão.</p>
            
            <div class="flex gap-2 mb-6">
                <input type="text" id="nameInput" placeholder="Nome para a etiqueta..." 
                    class="flex-1 p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="addLabel()" 
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition-colors">
                    Gerar + Etiqueta
                </button>
            </div>

            <div class="flex flex-wrap gap-4 border-t pt-4">
                <button onclick="window.print()" 
                    class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    Imprimir Etiquetas
                </button>
                <button onclick="clearAll()" 
                    class="text-red-600 hover:text-red-700 font-medium px-4 py-2">
                    Limpar Tudo
                </button>
            </div>
        </div>
    </div>

    <!-- Área de Exibição das Etiquetas -->
    <div id="labelsGrid" class="labels-container">
        <!-- As etiquetas serão inseridas aqui via JavaScript -->
    </div>

    <script>
        const labelsGrid = document.getElementById('labelsGrid');
        const nameInput = document.getElementById('nameInput');

        // Adicionar etiqueta ao pressionar Enter
        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addLabel();
        });

        function addLabel() {
            const text = nameInput.value.trim() || "";
            createLabelElement(text);
            nameInput.value = '';
            nameInput.focus();
        }

        function createLabelElement(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'label-outer-wrapper relative group';
            
            const outer = document.createElement('div');
            outer.className = 'label-outer';
            
            const inner = document.createElement('div');
            inner.className = 'label-inner';
            
            const content = document.createElement('div');
            content.className = 'label-text';
            content.contentEditable = true;
            content.innerText = text;
            
            // Botão de remover (visível apenas no ecrã)
            const removeBtn = document.createElement('button');
            removeBtn.innerHTML = '&times;';
            removeBtn.className = 'no-print absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer shadow-sm';
            removeBtn.onclick = () => wrapper.remove();

            inner.appendChild(content);
            outer.appendChild(inner);
            wrapper.appendChild(outer);
            wrapper.appendChild(removeBtn);
            
            labelsGrid.appendChild(wrapper);
        }

        function clearAll() {
            if (confirm('Deseja remover todas as etiquetas geradas?')) {
                labelsGrid.innerHTML = '';
            }
        }
    </script>
</body>
</html>
